<!DOCTYPE html>
 
<html>
 
<head>
    <title>Portfolio</title>
 
    <style>
 
     
 
        .dark{
            background:black;
            color:white;
        }
 
        section{
            display:none;
        }
 
   
 
    </style>
 
</head>
 
<body>
 
<h1>My Portfolio</h1>
 
<h2 id="greeting"></h2>
 
<button onclick="theme()">Dark / Light Mode</button>
 
<br><br>
 
<button onclick="showAbout()">About</button>
<button onclick="showProject()">Projects</button>
<button onclick="showContact()">Contact</button>
 
<hr>
 
<section id="about">
    <h2>About Me</h2>
    <p>I am a CSE Student.</p>
</section>
 
<section id="project">
    <h2>Projects</h2>
    <p>Calculator Project</p>
    <p>Library Management System</p>
</section>
 
<section id="contact">
 
<h2>Contact Form</h2>
 
<form onsubmit="return handleSubmit()">
 
<label>Name:</label>
<input type="text" id="name"><br><br>
 
<label>Email:</label>
<input type="text" id="email"><br><br>
 
<label>Message:</label><br>
<textarea id="message"></textarea><br><br>
 
<button type="submit">Submit</button>
 
</form>
 
</section>
 
<script>
 
// Greeting
 
var hour = new Date().getHours();
 
if(hour<12)
{
    document.getElementById("greeting").innerHTML="Good Morning";
}
else if(hour<18)
{
    document.getElementById("greeting").innerHTML="Good Afternoon";
}
else
{
    document.getElementById("greeting").innerHTML="Good Evening";
}
 
 
// Theme
 
function theme()
{
    document.body.classList.toggle("dark");
}
 
 
// About
 
function showAbout()
{
    document.getElementById("about").style.display="block";
    document.getElementById("project").style.display="none";
    document.getElementById("contact").style.display="none";
}
 
 
// Project
 
function showProject()
{
    document.getElementById("about").style.display="none";
    document.getElementById("project").style.display="block";
    document.getElementById("contact").style.display="none";
}
 
 
// Contact
 
function showContact()
{
    document.getElementById("about").style.display="none";
    document.getElementById("project").style.display="none";
    document.getElementById("contact").style.display="block";
}
 
 
// Form Validation
 
function handleSubmit()
{
 
    var name=document.getElementById("name").value;
    var email=document.getElementById("email").value;
    var message=document.getElementById("message").value;
 
    if(name=="" || email=="" || message=="")
    {
        alert("Please fill all fields.");
        return false;
    }
 
    if(email.indexOf("@")==-1 || email.indexOf(".")==-1)
    {
        alert("Invalid Email");
        return false;
    }
 
    if(message.length<10)
    {
        alert("Message must be at least 10 characters.");
        return false;
    }
 
    alert("Message Sent Successfully!");
 
    return false;
 
}
 
</script>
 
</body>
 
</html>
