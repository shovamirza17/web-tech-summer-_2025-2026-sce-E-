<!DOCTYPE html>
<html>
<head>
    <title>The Career Development Office Internship Confirmation Form</title>
</head>
<body>

<form>
    <h2 align="center"><b>INTERNSHIP CONFIRMATION FORM</b></h2>
    <h3 align="center"><strong>FOR FINAL YEAR STUDENTS</strong></h3>

    <center>
    <table>

        <tr>
            <td>Student Name :</td>
            <td>
                <input type="text" name="studentName" required>
            </td>
        </tr>

        <tr>
            <td>Email :</td>
            <td>
                <input type="email" name="email" placeholder="abc@gmail.com" required>
            </td>
        </tr>

        <tr>
            <td>Preferred Internship Type :</td>
            <td>
                <input type="radio" name="preferred_internship" value="On-Site"> On-Site
                <input type="radio" name="preferred_internship" value="Remote"> Remote
            </td>
        </tr>

        <tr>
            <td>Internship Duration :</td>
            <td>
                <select name="duration">
                    <option value="6-Weeks">6 Weeks</option>
                    <option value="3-Months">3 Months</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Skills of Interest :</td>
            <td>
                <input type="checkbox" name="skills" value="Web Development"> Web Development
                <input type="checkbox" name="skills" value="Data Analysis"> Data Analysis
                <input type="checkbox" name="skills" value="Mobile Apps"> Mobile Apps
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="Submit">
            </td>
        </tr>

    </table>
    </center>

</form>

</body>
</html>
